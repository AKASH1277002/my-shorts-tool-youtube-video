<!DOCTYPE html>
<html lang="hi">
<head>
    <script async="async" data-cfasync="false" src="https://pl29406084.profitablecpmratenetwork.com/3bc02207807b926462c40600471a430c/invoke.js"></script>
<div id="container-3bc02207807b926462c40600471a430c"></div>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Shorts Pro Multi-Viewer</title>
    <style>
        :root { --primary: #ff0000; --bg: #0f0f0f; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 20px; text-align: center; }
        .header h1 { color: var(--primary); margin-bottom: 5px; }
        .header p { color: #aaa; margin-bottom: 30px; }
        
        .controls { background: var(--card-bg); padding: 25px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; width: 350px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; margin-bottom: 15px; }
        
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        .btn-add { background: var(--primary); color: white; }
        .btn-add:hover { background: #cc0000; scale: 1.05; }
        
        .btn-delete { background: #444; color: white; }
        .btn-delete:hover { background: #666; }
        
        select { padding: 12px; border-radius: 5px; background: #2a2a2a; color: white; border: 1px solid #444; }

        #video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-top: 40px; 
            padding-bottom: 50px;
        }
        .video-card { 
            background: var(--card-bg); 
            padding: 8px; 
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            aspect-ratio: 9/16;
            position: relative;
        }
        iframe { width: 100%; height: 100%; border-radius: 8px; border: none; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎬 YouTube Shorts Pro Viewer</h1>
    <p>Ek saath multiple videos play karein aur views boost karein</p>
</div>

<div class="controls">
    <input type="text" id="videoUrl" placeholder="Yahan Shorts URL paste karein...">
    <div class="btn-group">
        <select id="videoCount">
            <option value="1">1 Video</option>
            <option value="5">5 Videos</option>
            <option value="10">10 Videos</option>
            <option value="15">15 Videos</option>
            <option value="20">20 Videos</option>
        </select>
        <button class="btn-add" onclick="multiLoad()">🚀 Load Videos</button>
        <button class="btn-delete" onclick="deleteAll()">🗑️ Delete All</button>
    </div>
</div>

<div id="video-grid"></div>

<script>
    function extractVideoId(url) {
        let videoId = "";
        if (url.includes("shorts/")) {
            videoId = url.split("shorts/")[1].split("?")[0];
        } else if (url.includes("v=")) {
            videoId = url.split("v=")[1].split("&")[0];
        } else if (url.includes("youtu.be/")) {
            videoId = url.split("youtu.be/")[1].split("?")[0];
        }
        return videoId;
    }

    function multiLoad() {
        let urlInput = document.getElementById('videoUrl').value;
        let count = document.getElementById('videoCount').value;
        let grid = document.getElementById('video-grid');

        if (urlInput === "") {
            alert("Pehle URL daalein!");
            return;
        }

        let id = extractVideoId(urlInput);
        if (!id) {
            alert("Sahi YouTube URL daalein!");
            return;
        }

        let embedUrl = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}`;

        for (let i = 0; i < count; i++) {
            let card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `<iframe src="${embedUrl}" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            grid.appendChild(card);
        }
    }

    function deleteAll() {
        if(confirm("Kya aap saare videos hatana chahte hain?")) {
            document.getElementById('video-grid').innerHTML = "";
        }
    }
</script>

</body>
</html>
